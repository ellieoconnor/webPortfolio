<h1>Writing</h1>
<mat-divider></mat-divider>
@for (post of posts; track post.id) {
	<div class="post-summary" (click)="getBlogPost(post.id)">
		<h2>{{ post.title }}</h2>
		<span class="published-date">{{ post.publishedAt | date: 'longDate' }}</span>
		<span class="reading-time">{{ post.readingTimeMinutes }} min read</span>
		<p class="summaries">{{ post.description }}</p>
		<mat-divider></mat-divider>
	</div>
}
